<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#E10600" />
  <title>Compra confirmada — SCORE STORE</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="statusBody">

  <nav class="navbar">
    <div class="nav-container">
      <a class="brand" href="/" aria-label="Inicio">
        <img src="/assets/logo-score.webp" alt="SCORE" class="nav-logo">
      </a>
    </div>
  </nav>

  <main class="statusWrap">
    <section class="statusCard">
      <div class="statusIcon ok">✓</div>
      <h1 class="statusTitle">¡Pago confirmado!</h1>
      <p class="statusText">
        Tu pedido fue creado correctamente. Si elegiste envío, Stripe te pidió tu dirección y nosotros generaremos la guía.
      </p>
      <p class="statusMuted" id="sessionInfo"></p>

      <div class="statusActions">
        <a class="cta-btn" href="/">Volver a la tienda</a>
        <a class="cta-btn secondary" href="/legal.html">Ver políticas</a>
      </div>

      <p class="statusHint">
        Si pagaste con <strong>OXXO</strong>, recuerda que el pago puede tardar en reflejarse. Te contactamos si hace falta.
      </p>
    </section>
  </main>

  <script>
    (function(){
      const url = new URL(location.href);
      const sid = url.searchParams.get("session_id");
      const el = document.getElementById("sessionInfo");
      if (sid && el) el.textContent = "Session: " + sid;
    })();
  </script>
</body>
</html>
