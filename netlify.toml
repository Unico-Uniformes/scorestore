[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ========= API -> Netlify Functions =========
# /api/checkout -> /.netlify/functions/checkout (create_checkout.js)
# /api/quote    -> /.netlify/functions/quote   (quote_shipping.js)
# /api/chat     -> /.netlify/functions/chat    (chat.js)
# /api/stripe-webhook -> /.netlify/functions/stripe_webhook
# /api/envia-webhook  -> /.netlify/functions/envia_webhook
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ========= SPA fallback =========
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ========= Headers (básicos, no rompen) =========
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache agresivo para assets (si cambias assets, renombra archivo o usa querystring)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Evita cachear el catálogo (para que siempre respete cambios)
[[headers]]
  for = "/data/catalog.json"
  [headers.values]
    Cache-Control = "no-store"

# Content-Type para manifest
[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"