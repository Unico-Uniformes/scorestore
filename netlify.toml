[build]
  publish = "."
  functions = "netlify/functions"

# ---------- API routes (proxy to Netlify Functions) ----------
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/create_checkout"
  status = 200
  force = true

[[redirects]]
  from = "/api/quote"
  to = "/.netlify/functions/quote_shipping"
  status = 200
  force = true

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# Stripe webhook endpoint (optional)
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe_webhook"
  status = 200
  force = true

# Envia webhook endpoint (optional)
[[redirects]]
  from = "/api/envia-webhook"
  to = "/.netlify/functions/envia_webhook"
  status = 200
  force = true

# ---------- caching ----------
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
