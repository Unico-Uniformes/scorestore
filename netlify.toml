[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["data/*.json", "db/*.sql"]

# ========= API -> Netlify Functions =========
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ========= SPA fallback =========
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ========= Headers de Seguridad Nivel NASA =========
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # HACKER FIX: Política de Contenido Estricta para mitigar inyecciones XSS externas
    Content-Security-Policy = "default-src 'self' https://js.stripe.com https://generativelanguage.googleapis.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://api.envia.com;"
    Access-Control-Allow-Origin = "*"

# Cache agresivo para assets visuales estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Evita cachear JSON de datos (Crucial para ver inventario nuevo en tiempo real)
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Content-Type para manifest PWA
[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"