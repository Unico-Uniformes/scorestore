<!doctype html>
<html lang="es-MX">
<head>

<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#E10600">

<title>SCORE STORE — Official Merchandise</title>

<meta name="description" content="Merch Oficial de Score International. Pago cifrado seguro con Stripe + Logística Envía.com.">
<meta name="robots" content="index,follow,max-image-preview:large">

<link rel="canonical" href="https://scorestore.netlify.app/">

<meta property="og:type" content="website">
<meta property="og:title" content="SCORE STORE — Official Merchandise">
<meta property="og:description" content="Merch Oficial de Score International.">
<meta property="og:image" content="https://scorestore.netlify.app/assets/hero.webp">

<meta name="twitter:card" content="summary_large_image">

<link rel="manifest" href="/site.webmanifest">

<link rel="icon" href="/assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

<link rel="preload" href="/css/styles.css" as="style">
<link rel="preload" href="/assets/hero.webp" as="image" fetchpriority="high">

<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/override.css">

</head>

<body>

<header class="topbar">

<div class="wrap topbar__inner">

<button id="openMenuBtn" class="iconbtn">≡</button>

<a class="brand" href="/index.html">
<img src="/assets/logo-score.webp" alt="SCORE STORE" width="120" height="48">
</a>

<div class="topbar__actions">

<div class="search desktop-only glass-panel">
<span class="search__icon">⌕</span>
<input id="searchInput" type="search" placeholder="Buscar hoodies, gorras, merch...">
</div>

<button id="mobileSearchBtn" class="iconbtn mobile-only">⌕</button>

<button id="openAssistantBtn" class="iconbtn tech-glow">

<svg viewBox="0 0 24 24" width="18">
<path d="M12 2l1.4 4.2L18 8l-4.6 1.8L12 14l-1.4-4.2L6 8l4.6-1.8z"/>
</svg>

</button>

<button id="openCartBtn" class="iconbtn iconbtn--dark">
🛒
<span id="cartCount" class="badge">0</span>
</button>

</div>
</div>

</header>


<section class="hero">

<div class="wrap hero__inner">

<img
src="/assets/logo-world-desert.webp"
width="280"
height="253"
alt="World Desert Championship"
>

<h1>Merch Oficial <span class="accent">SCORE</span></h1>

<p>
Diseño, pasión y rendimiento extremo en cada hilo.
<strong>Fabricado por UNICO UNIFORMES.</strong>
</p>

<button id="scrollToCategoriesBtn" class="btn btn--primary">
Explorar Colecciones
</button>

</div>

</section>


<main>

<section class="wrap">

<h2 id="categories">1. Elige tu Experiencia Off-Road</h2>

<div id="categoryGrid"></div>

</section>


<section id="catalogCarouselSection" class="wrap" hidden>

<div class="carousel-header">

<h3 id="carouselTitle">Catálogo</h3>

<div class="carousel-controls">

<button id="scrollLeftBtn">←</button>

<button id="scrollRightBtn">→</button>

</div>

</div>


<div class="section__tools">

<span id="statusRow"></span>

<select id="sortSelect">

<option value="featured">Relevancia</option>
<option value="price_asc">Menor Precio</option>
<option value="price_desc">Mayor Precio</option>
<option value="name_asc">A-Z</option>

</select>

</div>


<div id="productGrid" class="carousel-track"></div>

</section>

</main>


<footer class="footer">

<div class="wrap footer__inner">

<div>

<strong>SCORE STORE</strong>

<p>
Pago cifrado Stripe<br>
Logística Envía.com
</p>

</div>

<div>

<a href="https://www.facebook.com/uniforme.unico/">Facebook</a>

<a href="https://www.instagram.com/uniformes.unico">Instagram</a>

<a href="https://youtu.be/F4lw1EcehIA">YouTube</a>

</div>

</div>

</footer>

<script src="/js/main.js" defer></script>

</body>
