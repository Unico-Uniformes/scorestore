<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Pago Cancelado — SCORE STORE</title>

  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center;">

  <div class="hero__bg" style="position:fixed; inset:0; z-index:-2; animation: none; filter: grayscale(1) brightness(0.3);"></div>

  <main class="wrap section main-card-bg" style="max-width: 550px; position: relative; z-index: 10; border-top: 5px solid var(--black-btn);">

    <img src="assets/logo-score.webp" alt="Score Store" style="height: 50px; margin: 0 auto 20px auto; filter: grayscale(1); opacity: 0.8;">

    <div style="font-size: 54px; margin-bottom: 16px;">⚠️</div>
    <h1 style="color: var(--black-btn); font-weight: 900; margin-bottom: 16px; font-size: 28px;">Pago Incompleto</h1>

    <p class="hint" style="max-width: 400px; margin: 0 auto 24px; font-size: 15px; color: var(--text);">
      No se realizó ningún cobro. Tu carrito de compras sigue guardado en este dispositivo.<br><br>
      Si tu banco rechazó la transacción, te sugerimos intentar de nuevo con otra tarjeta o seleccionar la opción de <b>Pago en OXXO</b>.
    </p>

    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px;">
      <a class="btn btn--primary cinematic-btn" href="/">Regresar al catálogo</a>
      <a class="btn btn--ghost" href="legal.html">Ver soporte legal</a>
    </div>
  </main>

</body>
</html>
