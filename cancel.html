<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#E10600" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Pago cancelado — SCORE STORE</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; background: var(--bg-alt);">

  <main class="wrap section" style="background: #fff; padding: 40px 20px; border-radius: var(--radius2); box-shadow: var(--shadow2); max-width: 500px;">
    <div style="font-size: 54px; margin-bottom: 16px;">❌</div>
    <h1 style="color: var(--black-btn); font-weight: 900; margin-bottom: 16px;">Pago cancelado</h1>
    
    <p class="hint" style="max-width: 400px; margin: 0 auto 24px; font-size: 15px;">
      No se realizó el cobro. Tu carrito sigue guardado en este dispositivo, puedes intentar de nuevo cuando quieras. <br><br>
      Si tu banco rechazó el pago, prueba con otro método (Tarjeta u OXXO).
    </p>

    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
      <a class="btn btn--primary" href="/">Regresar al catálogo</a>
      <a class="btn btn--ghost" href="legal.html">Ver políticas</a>
    </div>
  </main>

</body>
</html>
