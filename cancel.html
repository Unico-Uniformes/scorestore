<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#E10600" />
  <title>Pago cancelado — SCORE STORE</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="statusBody">

  <nav class="navbar">
    <div class="nav-container">
      <a class="brand" href="/" aria-label="Inicio">
        <img src="/assets/logo-score.webp" alt="SCORE" class="nav-logo">
      </a>
    </div>
  </nav>

  <main class="statusWrap">
    <section class="statusCard">
      <div class="statusIcon bad">!</div>
      <h1 class="statusTitle">Pago cancelado</h1>
      <p class="statusText">
        No se realizó el cobro. Tu carrito sigue guardado en este dispositivo, puedes intentar de nuevo cuando quieras.
      </p>

      <div class="statusActions">
        <a class="cta-btn" href="/">Regresar</a>
        <a class="cta-btn secondary" href="/legal.html">Ver políticas</a>
      </div>

      <p class="statusHint">
        Si tu banco rechazó el pago, prueba con otro método (Card u OXXO).
      </p>
    </section>
  </main>

</body>
</html>
